# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI/CD with Gradle

on:
  push:
    branches:
      - release

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/checkout@v4

      - name: Load appliciton yml files
        run: |
          cd ./src/main/resources
          touch ./application.yml
          touch ./application-prod.yml
          echo "${{ secrets.APPLICATION }}" > ./application.yml
          echo "${{ secrets.APPLICATION_PROD }}" > ./application-prod.yml

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker Login
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cotato-weather-server .
          docker push ${{ secrets.DOCKER_USERNAME }}/cotato-weather-server

      - name: Run Application in EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}

          script: |
            sudo docker kill cotato-weather-server
            sudo docker rm -f cotato-weather-server
            sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/cotato-weather-server
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cotato-weather-server
            sudo docker run -p 8080:8080 --name cotato-weather-server -d ${{ secrets.DOCKER_USERNAME }}/cotato-weather-server
    
